<!DOCTYPE html>
<html>
<head>
  <title>Lado Internship Verification System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f4f6f8;
    }

    .header{
      background:green;
      color:white;
      padding:18px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      max-width:700px;
      margin:20px auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
    }

    button{
      width:100%;
      margin-top:12px;
      padding:12px;
      background:green;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#0a7a0a;
    }

    .card{
      margin-top:15px;
      padding:15px;
      background:#f9f9f9;
      border-radius:10px;
      line-height:1.7;
    }

    .ok{
      color:green;
      font-weight:bold;
      font-size:18px;
      margin-top:10px;
    }

    .bad{
      color:red;
      font-weight:bold;
      font-size:18px;
      margin-top:10px;
    }

    .small{
      font-size:13px;
      color:gray;
      margin-top:5px;
    }

    .footer{
      text-align:center;
      font-size:12px;
      padding:20px;
      color:gray;
    }
  </style>
</head>

<body>

<div class="header">
  Lado Women Foundation<br>
  Internship Verification System
</div>

<div class="container">

  <h3>Verify Certificate</h3>

  <input id="search" placeholder="Enter Internship ID / Certificate No / Roll No">

  <button onclick="verify()">VERIFY NOW</button>

  <div class="small">
    Example: LWF2026 / CERT123 / ROLL45
  </div>

  <div id="result"></div>

</div>

<div class="footer">
  © Lado Women Foundation | Verification System
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzi2xOyd7OXiAEx8ZFeRgdGuKp_cykUrj7n84pujLRgZiO7YdZbZ_StIB04Qn0ecjWvTQ/exec";

function verify(){

  let search = document.getElementById("search").value.trim();

  if(search === ""){
    document.getElementById("result").innerHTML =
      "<div class='bad'>⚠️ Please enter ID</div>";
    return;
  }

  document.getElementById("result").innerHTML =
    "<div class='small'>Checking...</div>";

  fetch(API_URL + "?search=" + encodeURIComponent(search))
  .then(res => res.json())
  .then(data => {

    if(data.status === "found"){

      let d = data.data;

      document.getElementById("result").innerHTML =
        "<div class='ok'>✔️ VERIFIED SUCCESSFULLY</div>" +
        "<div class='card'>" +
        "<b>Internship ID:</b> " + d.internshipId + "<br>" +
        "<b>Student Name:</b> " + d.studentName + "<br>" +
        "<b>Father Name:</b> " + d.fatherName + "<br>" +
        "<b>College:</b> " + d.college + "<br>" +
        "<b>Roll No:</b> " + d.rollNo + "<br>" +
        "<b>Class:</b> " + d.class + "<br>" +
        "<b>Semester:</b> " + d.semester + "<br>" +
        "<b>Duration:</b> " + d.duration + "<br>" +
        "<b>Certificate No:</b> " + d.certificateNo + "<br>" +
        "<b>Issue Date:</b> " + d.issueDate + "<br>" +
        "<b>Status:</b> " + d.status + "<br>" +
        "<b>Organisation:</b> " + d.organisationName +
        "</div>";

    } else {
      document.getElementById("result").innerHTML =
        "<div class='bad'>❌ NOT FOUND</div>" +
        "<div class='small'>Please check ID and try again</div>";
    }

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "<div class='bad'>Server Error</div>";
  });

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Lado Internship Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      padding:40px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      width:90%;
      max-width:400px;
      margin:auto;
      box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      background:green;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    #result{
      margin-top:20px;
      text-align:left;
      font-size:15px;
      line-height:1.6;
    }

    .ok{color:green;font-weight:bold;}
    .bad{color:red;font-weight:bold;}
  </style>
</head>

<body>

<div class="box">

  <h2>Internship Verification</h2>

  <input id="search" placeholder="Enter ID / Certificate No">

  <br>

  <button onclick="verify()">VERIFY</button>

  <div id="result"></div>

</div>

<script>

function verify(){

  let id = document.getElementById("search").value;

  document.getElementById("result").innerHTML = "Checking...";

  fetch("https://script.google.com/macros/s/AKfycbzg1MmMDJOedlYOwWyoCLf3hpKiOHWtDXHksbkB37Xtnylj7DEWBYZ7ELu_zBwQaG89Gw/exec?search=" + id)

  .then(res => res.json())
  .then(res => {

    if(res.status === "found"){

      let d = res.data;

      document.getElementById("result").innerHTML = `
        <div class="ok">✔️ VERIFIED</div><br>

        <b>Name:</b> ${d.name || ""}<br>
        <b>Father:</b> ${d.father || ""}<br>
        <b>Roll No:</b> ${d.roll || ""}<br>
        <b>Certificate No:</b> ${d.certificate || ""}<br>
        <b>Status:</b> ${d.status || ""}
      `;

    } else {
      document.getElementById("result").innerHTML =
        "<div class='bad'>❌ NOT FOUND</div>";
    }

  })
  .catch(() => {
    document.getElementById("result").innerHTML =
      "<div class='bad'>Server Error</div>";
  });

}

</script>

</body>
</html>

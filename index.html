<!DOCTYPE html>
<html>
<head>
  <title>Lado Internship Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f8;
    }

    .header{
      background:green;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .nav{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      padding:10px;
      background:#eee;
    }

    .nav button{
      padding:10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background:white;
    }

    .box{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    input{
      width:90%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      margin-top:10px;
      padding:10px 15px;
      background:green;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    #result{
      margin-top:20px;
      text-align:left;
      line-height:1.7;
    }

    .ok{color:green;font-weight:bold;font-size:18px;}
    .bad{color:red;font-weight:bold;font-size:18px;}

    .card{
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    iframe{
      width:100%;
      height:700px;
      border:none;
    }

    .hidden{display:none;}
  </style>
</head>

<body>

<div class="header">Lado Women Foundation - Internship Portal</div>

<!-- NAVIGATION -->
<div class="nav">

  <button onclick="showTab('verify')">Verification</button>
  <button onclick="showTab('apply')">Apply Internship</button>
  <button onclick="showTab('admin')">Admin Login</button>
  <button onclick="showTab('photos')">Activity Photos</button>

</div>

<!-- VERIFY -->
<div id="verify" class="box">

  <h3>Certificate Verification</h3>

  <input id="search" placeholder="Enter ID / Name / Certificate / Roll No">

  <button onclick="verify()">VERIFY</button>

  <div id="result"></div>

</div>

<!-- APPLY FORM -->
<div id="apply" class="box hidden">

  <h3>Apply for Internship</h3>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfkra6mMkvpDvdJ-4BiDNj9pfYv_ivl8LUP0MvxMneYKOHqEQ/viewform?embedded=true"></iframe>

</div>

<!-- ADMIN -->
<div id="admin" class="box hidden">

  <h3>Admin Login</h3>

  <input type="password" id="pass" placeholder="Enter Admin Password">

  <button onclick="login()">LOGIN</button>

  <div id="adminPanel" class="hidden">

    <div class="card">
      <h4>Dashboard</h4>
      <p>✔️ System Active</p>
      <p>✔️ Google Sheet Connected</p>
      <p>✔️ Apps Script Working</p>
      <p>✔️ Verification Live</p>
    </div>

  </div>

</div>

<!-- PHOTOS -->
<div id="photos" class="box hidden">

  <h3>Activity Photos</h3>

  <div class="card">
    <img src="https://via.placeholder.com/600x300?text=Training+Session">
    <p>Training Session</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/600x300?text=Workshop+Activity">
    <p>Workshop Activity</p>
  </div>

</div>

<script>

/* TAB SYSTEM */
function showTab(tab){

  let sections = ["verify","apply","admin","photos"];

  sections.forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });

  document.getElementById(tab).classList.remove("hidden");
}

/* VERIFY SYSTEM */
function verify(){

  let id = document.getElementById("search").value;

  document.getElementById("result").innerHTML = "Checking...";

  fetch("https://script.google.com/macros/s/AKfycbzg1MmMDJOedlYOwWyoCLf3hpKiOHWtDXHksbkB37Xtnylj7DEWBYZ7ELu_zBwQaG89Gw/exec?search=" + id)

  .then(res => res.json())
  .then(res => {

    if(res.status === "found"){

      let d = res.data;

      document.getElementById("result").innerHTML =
        "<div class='ok'>✔️ VERIFIED CERTIFICATE</div>" +
        "<div class='card'>" +
        "<b>Internship ID:</b> " + d.internshipId + "<br>" +
        "<b>Name:</b> " + d.name + "<br>" +
        "<b>Father:</b> " + d.father + "<br>" +
        "<b>Class:</b> " + d.class + "<br>" +
        "<b>Semester:</b> " + d.semester + "<br>" +
        "<b>College:</b> " + d.college + "<br>" +
        "<b>Roll No:</b> " + d.rollNo + "<br>" +
        "<b>Duration:</b> " + d.duration + "<br>" +
        "<b>Certificate No:</b> " + d.certificateNo + "<br>" +
        "<b>Issue Date:</b> " + d.issueDate + "<br>" +
        "<b>Status:</b> " + d.status +
        "</div>";

    } else {
      document.getElementById("result").innerHTML =
        "<div class='bad'>❌ NOT FOUND</div>";
    }

  });

}

/* ADMIN LOGIN */
function login(){

  let p = document.getElementById("pass").value;

  if(p === "admin123"){
    document.getElementById("adminPanel").classList.remove("hidden");
  } else {
    alert("Wrong Password");
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Lado Internship Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial;text-align:center;padding:40px;background:#f5f5f5;">

<h2>Internship Certificate Verification</h2>

<input id="search" placeholder="Enter ID / Name / Certificate No"
style="padding:10px;width:250px;border:1px solid #ccc;border-radius:5px;">

<br><br>

<button onclick="verify()"
style="padding:10px 20px;background:green;color:white;border:none;border-radius:5px;">
VERIFY
</button>

<div id="result" style="margin-top:30px;font-size:18px;"></div>

<script>

function verify() {

  let id = document.getElementById("search").value;

  document.getElementById("result").innerHTML = "Checking...";

  fetch("https://script.google.com/macros/s/AKfycbzg1MmMDJOedlYOwWyoCLf3hpKiOHWtDXHksbkB37Xtnylj7DEWBYZ7ELu_zBwQaG89Gw/exec?search=" + id)

  .then(res => res.json())
  .then(res => {

    if(res.status === "found") {

      let d = res.data;

      document.getElementById("result").innerHTML =
        "<h3 style='color:green'>✔️ VERIFIED</h3>" +
        "<b>Name:</b> " + d.name + "<br>" +
        "<b>Father:</b> " + d.father + "<br>" +
        "<b>College:</b> " + d.college + "<br>" +
        "<b>Roll No:</b> " + d.roll + "<br>" +
        "<b>Certificate No:</b> " + d.certificate + "<br>" +
        "<b>Status:</b> " + d.status;

    } else {
      document.getElementById("result").innerHTML =
        "<h3 style='color:red'>❌ NOT FOUND</h3>";
    }

  })
  .catch(() => {
    document.getElementById("result").innerHTML =
      "Server Error";
  });

}

</script>

</body>
</html>
